<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Horticulture & Climate Calculators</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Nunito Sans',sans-serif;
margin:0;
background:#f7faf7;
color:#333;
padding-top:80px;
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding-bottom:80px;
}

h1{
font-size:32px;
color:#175226;
margin:30px 0;
border-bottom:2px solid #175226;
padding-bottom:10px;
}

h2{
font-size:22px;
margin-top:40px;
color:#175226;
border-bottom:1px solid #dcdcdc;
padding-bottom:5px;
}

details{
background:white;
border:1px solid #e3e3e3;
border-radius:8px;
margin-bottom:12px;
padding:8px 14px;
transition:all .2s ease;
}

details:hover{
border-color:#cfcfcf;
}

details[open]{
padding:16px;
}

summary{
font-weight:600;
cursor:pointer;
list-style:none;
position:relative;
padding-left:20px;
}

summary::before{
content:"▸";
position:absolute;
left:0;
font-size:14px;
}

details[open] summary::before{
transform:rotate(90deg);
}

label{
display:inline-block;
margin:6px 12px 6px 0;
font-size:14px;
font-weight:600;
color:#175226;
}

input{
padding:6px 8px;
width:140px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
background:#175226;
color:white;
border:none;
padding:7px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-top:6px;
}

button:hover{
background:#2e7d32;
}

.result{
margin-top:10px;
font-weight:700;
color:#175226;
}

#calculatorSearch{
width:100%;
max-width:420px;
padding:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

</style>

</head>


<body id="top">

<div id="header-container"></div>

<div class="container">

<h1>Horticulture & Climate Calculators</h1>

<!-- SEARCH BAR -->

<input
type="text"
id="calculatorSearch"
placeholder="Search calculators..."
>

<h2>Climate & Light Calculators</h2>
<div id="calcBlock1"></div>

<h2>Garden & Fertilizer Calculators</h2>
<div id="calcBlock2"></div>

<h2>General Conversions</h2>
<div id="calcBlock3"></div>

<h2>Heating & Ventilation</h2>
<div id="calcBlock4"></div>

<h2>Light Conversion Tools</h2>
<div id="calcBlock5"></div>

<h2>Water & H₂O₂ Tools</h2>
<div id="calcBlock6"></div>

</div>

<div id="footer-container"></div>


<script>

document.addEventListener("DOMContentLoaded", function(){

/* HEADER + FOOTER */

fetch("header.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("header-container").innerHTML=data;
});

fetch("footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer-container").innerHTML=data;
});

/* CALCULATOR SEARCH */

const search=document.getElementById("calculatorSearch");

search.addEventListener("keyup", function(){

const term=this.value.toLowerCase();

const calculators=document.querySelectorAll(".container details");

calculators.forEach(calc=>{

const title=calc.querySelector("summary").textContent.toLowerCase();

if(title.includes(term)){
calc.style.display="block";
}else{
calc.style.display="none";
}

});

});

});

</script>  


<!-- MODULE SCRIPTS -->

<script src="js/climate.js"></script>
<script src="js/fertilizer.js"></script>
<script src="js/conversions.js"></script>
<script src="js/heating.js"></script>
<script src="js/light.js"></script>
<script src="js/water.js"></script>


</body>
</html>
