<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horticulture & Climate Calculators</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Nunito Sans',sans-serif;
margin:0;
background:#fdfdfd;
color:#333;
padding-top:80px;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding-bottom:60px;
}

h1{
color:#175226;
margin:30px auto;
border-bottom:2px solid #175226;
padding-bottom:10px;
}

h2{
margin-top:40px;
border-bottom:2px solid #ccc;
padding-bottom:5px;
color:#175226;
}

details{
background:#fff;
border:1px solid #ddd;
border-radius:4px;
margin-bottom:10px;
padding:6px 10px;
}

details[open]{
padding:15px;
}

summary{
font-weight:bold;
cursor:pointer;
padding-left:20px;
position:relative;
}

summary::before{
content:"▶";
position:absolute;
left:0;
}

details[open] summary::before{
transform:rotate(90deg);
}

label{
display:inline-block;
margin:5px 10px 5px 0;
font-weight:bold;
color:#175226;
}

input,select{
padding:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#175226;
color:white;
border:none;
padding:8px 16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

.result{
margin-top:10px;
font-weight:bold;
color:#175226;
}

</style>
</head>

<body id="top">

<div id="header-container"></div>

<div class="container">

<h1>Horticulture & Climate Calculators</h1>

<h2>Climate & Light Calculators</h2>
<div id="calcBlock1"></div>

<h2>Garden & Fertilizer Calculators</h2>
<div id="calcBlock2"></div>

<h2>General Conversions</h2>
<div id="calcBlock3"></div>

<h2>Heating & Ventilation</h2>
<div id="calcBlock4"></div>

<h2>Light Conversion Tools</h2>
<div id="calcBlock5"></div>

<h2>Water & H₂O₂ Tools</h2>
<div id="calcBlock6"></div>

</div>

<div id="footer-container"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

fetch("/header.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("header-container").innerHTML=data;
});

fetch("/footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer-container").innerHTML=data;
});

});

</script>

<script src="/js/climate.js"></script>
<script src="/js/fertilizer.js"></script>
<script src="/js/conversions.js"></script>
<script src="/js/heating.js"></script>
<script src="/js/light.js"></script>
<script src="/js/water.js"></script>

</body>
</html>
