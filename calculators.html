<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Horticulture Calculators</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--green:#1f6f43;
--green-light:#2f8a55;
--bg:#f5f8f6;
--card:#ffffff;
--border:#e3e6e4;
--shadow:0 6px 18px rgba(0,0,0,.06);
}

body{
font-family:'Nunito Sans',sans-serif;
margin:0;
background:var(--bg);
color:#2b2b2b;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px 60px;
}

h1{
font-size:34px;
color:var(--green);
margin-bottom:25px;
}

h2{
margin-top:50px;
margin-bottom:20px;
font-size:22px;
color:var(--green);
font-weight:700;
}

/* SEARCH */

#calculatorSearch{
width:100%;
max-width:460px;
padding:14px 16px;
border-radius:10px;
border:1px solid var(--border);
font-size:15px;
box-shadow:var(--shadow);
margin-bottom:25px;
}

/* CALCULATOR CARDS */

details{
background:var(--card);
border-radius:12px;
border:1px solid var(--border);
box-shadow:var(--shadow);
margin-bottom:14px;
overflow:hidden;
transition:.25s;
}

details[open]{
border-color:#d5ddd8;
}

summary{
padding:16px 20px;
cursor:pointer;
font-weight:700;
font-size:16px;
color:var(--green);
list-style:none;
}

summary::-webkit-details-marker{
display:none;
}

/* CARD CONTENT */

details > *:not(summary){
padding:0 20px 18px;
}

/* FORM */

label{
display:block;
font-size:13px;
margin-top:12px;
margin-bottom:4px;
color:#666;
}

input{
width:100%;
max-width:240px;
padding:8px 10px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
background:white;
}

button{
margin-top:14px;
padding:9px 16px;
border:none;
background:var(--green);
color:white;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
background:var(--green-light);
}

/* RESULT OUTPUT */

.result{
margin-top:12px;
font-weight:700;
color:var(--green);
font-size:15px;
}

/* MOBILE */

@media(max-width:700px){

.container{
padding:25px 15px 50px;
}

summary{
font-size:15px;
}

}

</style>

</head>

<body>

<div id="header-container"></div>

<div class="container">

<h1>Horticulture & Climate Calculators</h1>
<p style="max-width:650px;color:#666;margin-bottom:30px">
Tools for greenhouse lighting, fertilizer planning, irrigation, and climate control.
</p>

<input id="calculatorSearch" placeholder="Search calculators...">

<h2>Climate & Light</h2>
<div id="calcBlock1"></div>

<h2>Garden & Fertilizer</h2>
<div id="calcBlock2"></div>

<h2>General Conversions</h2>
<div id="calcBlock3"></div>

<h2>Heating & Ventilation</h2>
<div id="calcBlock4"></div>

<h2>Water & H₂O₂ Tools</h2>
<div id="calcBlock6"></div>

</div>

<div id="footer-container"></div>

<script>

document.addEventListener("DOMContentLoaded",function(){

fetch("header.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("header-container").innerHTML=data
})

fetch("footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer-container").innerHTML=data
})

const search=document.getElementById("calculatorSearch")

search.addEventListener("keyup",function(){

const term=this.value.toLowerCase()

document.querySelectorAll("details").forEach(d=>{

const title=d.querySelector("summary").innerText.toLowerCase()

d.style.display=title.includes(term)?"block":"none"

})

})

})

</script>

<script src="js/climate.js"></script>
<script src="js/garden.js"></script>
<script src="js/conversions.js"></script>
<script src="js/heating.js"></script>
<script src="js/water.js"></script>

</body> 
</html>
