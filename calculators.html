<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Horticulture Calculators</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Nunito Sans',sans-serif;
margin:0;
background:#f7faf7;
color:#333;
padding-top:80px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
color:#175226;
border-bottom:2px solid #175226;
padding-bottom:10px;
}

h2{
margin-top:40px;
color:#175226;
border-bottom:1px solid #ddd;
padding-bottom:6px;
}

details{
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
background:white;
}

details[open]{
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

summary{
cursor:pointer;
font-weight:600;
}

label{
display:inline-block;
margin:6px 10px 6px 0;
}

input{
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#175226;
color:white;
border:none;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

.result{
margin-top:10px;
font-weight:700;
color:#175226;
}

#calculatorSearch{
width:100%;
max-width:400px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

</style>

</head>

<body>

<div id="header-container"></div>

<div class="container">

<h1>Horticulture & Climate Calculators</h1>

<input id="calculatorSearch" placeholder="Search calculators...">

<h2>Climate & Light</h2>
<div id="calcBlock1"></div>

<h2>Garden & Fertilizer</h2>
<div id="calcBlock2"></div>

<h2>General Conversions</h2>
<div id="calcBlock3"></div>

<h2>Heating & Ventilation</h2>
<div id="calcBlock4"></div>

<h2>Light Conversion</h2>
<div id="calcBlock5"></div>

<h2>Water & H₂O₂ Tools</h2>
<div id="calcBlock6"></div>

</div>

<div id="footer-container"></div>

<script>

document.addEventListener("DOMContentLoaded",function(){

fetch("header.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("header-container").innerHTML=data
})

fetch("footer.html")
.then(r=>r.text())
.then(data=>{
document.getElementById("footer-container").innerHTML=data
})

const search=document.getElementById("calculatorSearch")

search.addEventListener("keyup",function(){

const term=this.value.toLowerCase()

document.querySelectorAll("details").forEach(d=>{

const title=d.querySelector("summary").innerText.toLowerCase()

d.style.display=title.includes(term)?"block":"none"

})

})

})

</script>

<script src="js/climate.js"></script>
<script src="js/garden.js"></script>
<script src="js/fertilizer.js"></script>
<script src="js/conversions.js"></script>
<script src="js/environment.js"></script>
<script src="js/water.js"></script>

</body>
</html>
