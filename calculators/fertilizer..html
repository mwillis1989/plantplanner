<h3>Garden & Fertilizer Calculators</h3>

<!-- Bed Dimension Increase -->
<details>
<summary>Bed Dimension Increase Calculator</summary>

<label>Current Length</label>
<input id="bed_currentLength">

<label>Current Width</label>
<input id="bed_currentWidth">

<label>Current Depth</label>
<input id="bed_currentDepth">

<label>Increase %</label>
<input id="bed_increasePercent">

<button onclick="calculateBedAdjustment()">Calculate</button>

<div id="bedAdjResults"></div>

</details>


<!-- Cost of Nutrient Application -->
<details>
<summary>Cost of Nutrient Application Rate</summary>

<label>Bag Price ($)</label>
<input id="costBagPrice">

<label>Bag Size</label>
<input id="costBagSize">

<label>Nutrient %</label>
<input id="costNutrientProp">

<label>Area</label>
<input id="costArea">

<label>Application Rate</label>
<input id="costAppRate">

<button onclick="calcCostOfNutrient()">Calculate</button>

<div id="costNutrientResults"></div>

</details>


<!-- Fertilizer Application Rates -->
<details>
<summary>Fertilizer Application Rates</summary>

<label>Nutrient %</label>
<input id="appNutrientProp">

<label>Desired Rate</label>
<input id="appDesiredRate">

<label>Area</label>
<input id="appArea">

<button onclick="calcFertAppRates()">Calculate</button>

<div id="appRatesResults"></div>

</details>


<!-- Fertilizer Cost per KG -->
<details>
<summary>Fertilizer Cost Per KG</summary>

<label>Cost per Bag</label>
<input id="costBag">

<label>Bag Weight</label>
<input id="costBagKg">

<label>Nutrient %</label>
<input id="costBagProp">

<button onclick="calcFertCostPerKg()">Calculate</button>

<div id="costPerKgResults"></div>

</details>


<!-- Fertilizer Mixture -->
<details>
<summary>Fertilizer Mixture Calculator</summary>

<label>Fertilizer %</label>
<input id="fmPercent">

<label>Weight</label>
<input id="fmWeight">

<button onclick="calculateFertilizerMixture()">Calculate</button>

<div id="fmResult"></div>

</details>


<!-- Fertilizer Total Weights -->
<details>
<summary>Fertilizer Total Weights</summary>

<label>Nutrient %</label>
<input id="totWProportion">

<label>Fertilizer Weight</label>
<input id="totWWeight">

<label>Area</label>
<input id="totWArea">

<button onclick="calcFertTotalWeights()">Calculate</button>

<div id="totWResults"></div>

</details>


<!-- Fertilizer Value -->
<details>
<summary>Fertilizer Value Calculator</summary>

<label>US Tons of Dry Matter</label>
<input id="fvUsTons">

<label>Fertilizer %</label>
<input id="fvPercent">

<label>Area</label>
<input id="fvArea">

<button onclick="calculateFertilizerValue()">Calculate</button>

<div id="fvResult"></div>

</details>


<!-- Fertilizer Value Adjustment -->
<details>
<summary>Fertilizer Value Adjustment</summary>

<label>Base Tons</label>
<input id="adj_fvUsTons">

<label>Base %</label>
<input id="adj_fvPercent">

<label>Increase %</label>
<input id="adj_increasePercent">

<label>Area</label>
<input id="adj_fvArea">

<button onclick="calculateFertilizerAdjustment()">Calculate</button>

<div id="adj_fvResult"></div>

</details>


<!-- Imperial Acre Conversion -->
<details>
<summary>Imperial per Acre Conversion</summary>

<label>Value</label>
<input id="acreCustomValue">

<button onclick="calcAcreConversion()">Convert</button>

<div id="acreConversionResults"></div>

</details>


<script>

function calculateBedAdjustment(){

const p=1+(bed_increasePercent.value/100)

bedAdjResults.innerText=
(bed_currentLength.value*p).toFixed(2)+" × "+
(bed_currentWidth.value*p).toFixed(2)+" × "+
(bed_currentDepth.value*p).toFixed(2)

}


function calcCostOfNutrient(){

const nutrient=(costBagSize.value*(costNutrientProp.value/100))

costNutrientResults.innerText=
(costBagPrice.value/nutrient).toFixed(2)

}


function calcFertAppRates(){

const fert=(appDesiredRate.value/(appNutrientProp.value/100))

appRatesResults.innerText=fert.toFixed(2)

}


function calcFertCostPerKg(){

const nutrient=(costBagKg.value*(costBagProp.value/100))

costPerKgResults.innerText=
(costBag.value/nutrient).toFixed(2)

}


function calculateFertilizerMixture(){

fmResult.innerText=
(fmWeight.value*(fmPercent.value/100)).toFixed(2)

}


function calcFertTotalWeights(){

totWResults.innerText=
(totWWeight.value*(totWProportion.value/100)).toFixed(2)

}


function calculateFertilizerValue(){

fvResult.innerText=
(fvUsTons.value*2000*(fvPercent.value/100)).toFixed(2)

}


function calculateFertilizerAdjustment(){

const newPercent=
(adj_fvPercent.value*(1+(adj_increasePercent.value/100)))

adj_fvResult.innerText=
(adj_fvUsTons.value*2000*(newPercent/100)).toFixed(2)

}


function calcAcreConversion(){

acreConversionResults.innerText=
(acreCustomValue.value/43560).toFixed(6)+" per ft²"

}

</script>
