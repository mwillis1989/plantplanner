<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Coast Native Plant Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Nunito Sans',sans-serif;
    margin:0;
    padding:0;
    background:#fdfdfd;
    color:#333;
    padding-top:80px;
}

h1{
    color:#175226;
    margin:30px auto 20px;
    border-bottom:2px solid #175226;
    padding-bottom:10px;
    width:95%;
    max-width:1400px;
}

.controls-container{
    width:95%;
    max-width:1400px;
    margin:0 auto;
    background:#f9f9f9;
    padding:15px;
    border-radius:8px;
    border:1px solid #eee;
    box-sizing:border-box;
}

.language-row{
    margin-bottom:15px;
    padding-bottom:15px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.row-plant{
    display:flex;
    gap:20px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

.input-group{
    display:flex;
    flex-direction:column;
    width:100%;
    min-width:200px;
    flex:1;
}

label{
    margin-bottom:5px;
    font-weight:bold;
    color:#175226;
    font-size:14px;
}

select{
    padding:10px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:4px;
    background:#fff;
    width:100%;
}

.toggle-container{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    font-weight:bold;
    color:#175226;
    background:#e8f5e9;
    padding:5px 10px;
    border-radius:4px;
}

.btn-download{
    background:#175226;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

#compatibility{
    font-size:16px;
    color:#175226;
    font-weight:bold;
    margin:15px auto;
    padding:10px 15px;
    background:#e8f5e9;
    border-left:5px solid #175226;
    border-radius:4px;
    max-width:1400px;
    width:95%;
}

#desktop-results{
    margin:10px auto;
    width:95%;
    max-width:1400px;
    overflow:auto;
    border:1px solid #ddd;
}

#desktop-results table{
    width:100%;
    border-collapse:collapse;
}

#desktop-results th{
    background:#175226;
    color:#fff;
    padding:12px;
}

#desktop-results td{
    border:1px solid #ddd;
    padding:10px;
}

#mobile-results{
    width:95%;
    margin:0 auto;
}

.plant-table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.plant-table th,
.plant-table td{
    border:1px solid #ddd;
    padding:10px;
}

.plant-table th{
    background:#175226;
    color:#fff;
}

@media(max-width:768px){
    #desktop-results{display:none;}
}

@media(min-width:769px){
    #mobile-results{display:none;}
}
</style>
</head>

<body>

<div id="header-container"></div>

<h1>West Coast Native Plant Planner</h1>

<div class="controls-container">

<div class="language-row">

<div class="input-group" style="max-width:300px;">
<label for="languageSelect">Select Language:</label>
<select id="languageSelect">
<option value="1" selected>Common Name</option>
<option value="0">Latin Name</option>
<option value="3">Hul’qumi’num Name</option>
<option value="4">Halq̓eméylem Name</option>
<option value="5">Hul̓q̓umín̓um̓ Name</option>
<option value="6">SENĆOŦEN Name</option>
</select>
</div>

<div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;">
<div class="toggle-container">
<input type="checkbox" id="hideEmptyRows" checked>
<label for="hideEmptyRows" style="margin:0;">Hide Empty Rows</label>
</div>

<button class="btn-download" id="downloadBtn">Download CSV</button>
</div>

</div>

<div class="row-plant">
<div class="input-group">
<label>First Plant:</label>
<select id="dropdown1"><option value="">--Select--</option></select>
</div>

<div class="input-group">
<label>Second Plant:</label>
<select id="dropdown2"><option value="">--Select--</option></select>
</div>
</div>

<div class="row-plant">
<div class="input-group">
<label>Third Plant:</label>
<select id="dropdown3"><option value="">--Select--</option></select>
</div>

<div class="input-group">
<label>Fourth Plant:</label>
<select id="dropdown4"><option value="">--Select--</option></select>
</div>
</div>

</div>

<div id="compatibility">Initializing...</div>

<div id="desktop-results"></div>
<div id="mobile-results"></div>

<div id="footer-container"></div>

<script>
fetch("header.html")
.then(r=>r.text())
.then(d=>document.getElementById("header-container").innerHTML=d);

fetch("footer.html")
.then(r=>r.text())
.then(d=>document.getElementById("footer-container").innerHTML=d);

const googleSheetBase="https://docs.google.com/spreadsheets/d/e/2PACX-1vRRmEoZFMjr1zswChFvcC8fv0yVfbKUjgwm2WZi0Qztk_Of7GL_SkWORVdIygnzL1X3-gxh1s7Wctxt/pub?gid=78942440&single=true&output=csv";
const googleSheetUrl=googleSheetBase+"&t="+Date.now();

const proxyUrl="https://script.google.com/macros/s/AKfycbwcYEZ5ulu6yTQ9MkC2p7bkWoB0g4DJtWqv15NbITnwMpBgigAp45YLvrbbcNhQn44/exec?url=";

const DROPDOWN_IDS=["dropdown1","dropdown2","dropdown3","dropdown4"];

let rows=[];
let columnNames=[];
let currentNameIndex=1;

document.addEventListener("DOMContentLoaded",loadData);

async function loadData(){
const status=document.getElementById("compatibility");

document.getElementById("languageSelect").addEventListener("change",changeLang);
document.getElementById("hideEmptyRows").addEventListener("change",updateResults);
document.getElementById("downloadBtn").addEventListener("click",downloadCSV);

DROPDOWN_IDS.forEach(id=>{
document.getElementById(id).addEventListener("change",updateResults);
});

try{
status.textContent="Finding ecosystem data...";

const response=await fetch(proxyUrl+encodeURIComponent(googleSheetUrl),{cache:"no-store"});
const text=await response.text();

rows=parseCSV(text);

columnNames=rows[0].slice(1);
rows.shift();

populateDropdowns();
updateResults();

status.textContent="Select plants to compare.";
}
catch(err){
console.error(err);
status.textContent="Error loading database.";
}
}

function parseCSV(text){
return text.trim().split("\n").map(row=>row.split(","));
}

function populateDropdowns(){
rows.sort((a,b)=>(a[currentNameIndex]||"").localeCompare(b[currentNameIndex]||""));

DROPDOWN_IDS.forEach(id=>{
const dd=document.getElementById(id);
dd.innerHTML='<option value="">--Select--</option>';

rows.forEach(r=>{
const n=(r[currentNameIndex]||"").trim();
if(n && n.toLowerCase()!=="no information"){
const o=document.createElement("option");
o.value=n;
o.textContent=n;
dd.appendChild(o);
}
});
});
}

function changeLang(e){
currentNameIndex=parseInt(e.target.value);
populateDropdowns();
updateResults();
}

function updateResults(){
const selected=DROPDOWN_IDS.map(id=>document.getElementById(id).value).filter(v=>v);

document.getElementById("compatibility").textContent=
selected.length<2
? "Select at least two plants."
: selected.join(" + ");

document.getElementById("desktop-results").innerHTML=buildDesktop(selected);
document.getElementById("mobile-results").innerHTML=buildMobile(selected);
}

function buildDesktop(sel){
if(!sel.length)return "";

let html="<table><tr><th>Category</th>"+sel.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

columnNames.forEach((col,i)=>{
html+="<tr><td>"+col+"</td>";

sel.forEach(name=>{
const row=rows.find(r=>(r[currentNameIndex]||"").trim()===name);
html+="<td>"+(row?row[i+1]:"")+"</td>";
});

html+="</tr>";
});

html+="</table>";
return html;
}

function buildMobile(sel){
if(!sel.length)return "";

return sel.map(name=>{
const row=rows.find(r=>(r[currentNameIndex]||"").trim()===name);
if(!row)return "";

let html='<table class="plant-table">';
html+='<tr><th colspan="2">'+name+'</th></tr>';

columnNames.forEach((c,i)=>{
html+="<tr><td>"+c+"</td><td>"+(row[i+1]||"")+"</td></tr>";
});

html+="</table>";
return html;
}).join("");
}

function downloadCSV(){
alert("CSV export ready next step.");
}
</script>

</body>
</html>
