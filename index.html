<script>
/* === A. HEADER LOADER & MOBILE LOGIC === */

// 1. Fetch Header HTML
fetch("header.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("header-container").innerHTML = data;
    });

// 2. Global Mobile Menu Functions
window.openDrawer = function () {
    const drawer = document.getElementById("mobile-drawer");
    if (drawer) {
        drawer.classList.add("active");
        document.body.style.overflow = "hidden";
    }
};

window.closeDrawer = function () {
    const drawer = document.getElementById("mobile-drawer");
    if (drawer) {
        drawer.classList.remove("active");
        document.body.style.overflow = "auto";
    }
};

window.toggleMpanel = function (id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle("show");
};

window.onresize = function () {
    if (window.innerWidth > 1000) window.closeDrawer();
};


/* === B. CALCULATOR APP LOGIC === */

/* CACHE FIX ADDED HERE */
const googleSheetBase =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRRmEoZFMjr1zswChFvcC8fv0yVfbKUjgwm2WZi0Qztk_Of7GL_SkWORVdIygnzL1X3-gxh1s7Wctxt/pub?gid=78942440&single=true&output=csv";

const googleSheetUrl = googleSheetBase + "&t=" + Date.now();

const proxyUrl =
"https://script.google.com/macros/s/AKfycbwcYEZ5ulu6yTQ9MkC2p7bkWoB0g4DJtWqv15NbITnwMpBgigAp45YLvrbbcNhQn44/exec?url=";

const DROPDOWN_IDS = ["dropdown1", "dropdown2", "dropdown3", "dropdown4"];
const COMPATIBILITY_COLUMN_INDEX = 11;

let rows = [];
let columnNames = [];
let currentNameIndex = 1;

document.addEventListener("DOMContentLoaded", async () => {
    const statusBox = document.getElementById("compatibility");

    document.getElementById("languageSelect").addEventListener("change", handleLanguageChange);
    document.getElementById("hideEmptyRows").addEventListener("change", updateResults);
    document.getElementById("downloadBtn").addEventListener("click", downloadCSV);

    DROPDOWN_IDS.forEach(id => {
        document.getElementById(id).addEventListener("change", () => {
            updateResults();
            saveStateToURL();
        });
    });

    try {
        statusBox.textContent = "Finding ecosystem data...";

        const response = await fetch(
            proxyUrl + encodeURIComponent(googleSheetUrl),
            { cache: "no-store" }
        );

        if (!response.ok) throw new Error("Server error");

        rows = parseCSV(await response.text());

        if (rows.length < 2) throw new Error("Empty data");

        columnNames = rows[0].slice(1, 55);
        rows.shift();

        populateDropdowns();
        loadStateFromURL();

        statusBox.textContent =
            "Select plants to check historical common compatibilities.";

    } catch (error) {
        console.error(error);
        statusBox.innerHTML = "Error loading database. Please refresh page.";
        statusBox.style.color = "red";
    }
});


/* === HELPERS === */

function cleanString(str) {
    return (str || "")
        .toString()
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
}

function checkCompatibility(n1, n2) {
    const r1 = rows.find(r => (r[currentNameIndex] || "").trim() === n1);
    const r2 = rows.find(r => (r[currentNameIndex] || "").trim() === n2);

    if (!r1 || !r2) return false;

    const t1 = cleanString(r1[COMPATIBILITY_COLUMN_INDEX]);
    const t2 = cleanString(r2[COMPATIBILITY_COLUMN_INDEX]);

    const ns1 = [cleanString(r1[1]), cleanString(r1[0])];
    const ns2 = [cleanString(r2[1]), cleanString(r2[0])];

    return (
        (ns2[0].length > 3 && t1.indexOf(ns2[0]) > -1) ||
        (ns2[1].length > 3 && t1.indexOf(ns2[1]) > -1) ||
        (ns1[0].length > 3 && t2.indexOf(ns1[0]) > -1) ||
        (ns1[1].length > 3 && t2.indexOf(ns1[1]) > -1)
    );
}

function buildCompatibilitySentence(sel) {
    if (sel.length < 2)
        return "Select at least two plants to check compatibility.";

    let good = [];
    let bad = [];

    for (let i = 0; i < sel.length; i++) {
        for (let j = i + 1; j < sel.length; j++) {
            if (checkCompatibility(sel[i], sel[j])) {
                good.push(sel[i] + " & " + sel[j]);
            } else {
                bad.push(sel[i] + " & " + sel[j]);
            }
        }
    }

    if (!bad.length)
        return "All selected plants have been known to be found with each other!";

    if (!good.length)
        return "None of the selected plants have historically been commonly found with each other.";

    return `Compatible: [${good.join("; ")}]. Incompatible: [${bad.join("; ")}].`;
}

function parseCSV(txt) {
    let r = [];
    let rw = [];
    let q = false;
    let t = "";

    for (let i = 0; i < txt.length; i++) {
        let c = txt[i];
        let n = txt[i + 1];

        if (c === '"') {
            if (q && n === '"') {
                t += '"';
                i++;
            } else {
                q = !q;
            }
        } else if (c === "," && !q) {
            rw.push(t);
            t = "";
        } else if ((c === "\r" || c === "\n") && !q) {
            if (t || rw.length) rw.push(t);
            if (rw.length) r.push(rw);
            rw = [];
            t = "";

            if (c === "\r" && n === "\n") i++;
        } else {
            t += c;
        }
    }

    if (t || rw.length) {
        rw.push(t);
        r.push(rw);
    }

    return r;
}

function populateDropdowns() {
    rows.sort((a, b) =>
        (a[currentNameIndex] || "").localeCompare(b[currentNameIndex] || "")
    );

    DROPDOWN_IDS.forEach(id => {
        const dd = document.getElementById(id);
        const cv = dd.value;

        dd.innerHTML = '<option value="">--Select--</option>';

        rows.forEach(r => {
            const n = (r[currentNameIndex] || "").trim();

            if (n && n.toLowerCase() !== "no information") {
                const o = document.createElement("option");
                o.value = n;
                o.textContent = n;
                dd.appendChild(o);
            }
        });

        if (cv) dd.value = cv;
    });
}

function handleLanguageChange(e) {
    let oldI = currentNameIndex;
    let newI = parseInt(e.target.value);

    let s = DROPDOWN_IDS.map(id => {
        let v = document.getElementById(id).value;
        return v
            ? rows.find(r => (r[oldI] || "").trim() === v)
            : null;
    });

    currentNameIndex = newI;

    populateDropdowns();

    DROPDOWN_IDS.forEach((id, i) => {
        if (s[i]) {
            let dd = document.getElementById(id);
            let nm = (s[i][newI] || "").trim();

            for (let o of dd.options) {
                if (o.value === nm) dd.value = nm;
            }
        }
    });

    updateResults();
    saveStateToURL();
}

function updateResults() {
    const s = DROPDOWN_IDS
        .map(id => document.getElementById(id).value)
        .filter(v => v);

    const h = document.getElementById("hideEmptyRows").checked;

    document.getElementById("compatibility").textContent =
        buildCompatibilitySentence(s);

    document.getElementById("desktop-results").innerHTML =
        buildTable(s, h, false);

    document.getElementById("mobile-results").innerHTML =
        buildTable(s, h, true);
}

function buildTable(sel, hide, mob) {
    if (!sel.length) return "";

    if (mob) {
        return sel.map(p => {
            let r = rows.find(
                row => (row[currentNameIndex] || "").trim() === p
            );

            if (!r) return "";

            let h =
                `<table class="plant-table">
                <thead>
                    <tr><th colspan="2">${p}</th></tr>
                </thead>
                <tbody>
                <tr><td>Latin</td><td>${r[0]}</td></tr>`;

            columnNames.forEach((c, i) => {
                let v = r[i + 1] || "";

                if (!hide || v.replace(/no information/i, "").trim()) {
                    h += `<tr><td><strong>${c}</strong></td><td>${v}</td></tr>`;
                }
            });

            return h + "</tbody></table>";
        }).join("");
    }

    let h =
        `<table>
        <thead>
            <tr>
                <th>Category</th>
                ${sel.map(p => `<th>${p}</th>`).join("")}
            </tr>
        </thead>
        <tbody>
        <tr>
            <td><strong>Latin Name</strong></td>
            ${sel.map(p =>
                `<td>${(rows.find(r =>
                    (r[currentNameIndex] || "").trim() === p
                ) || [])[0] || ""}</td>`
            ).join("")}
        </tr>`;

    columnNames.forEach((col, i) => {
        let rowData = [];
        let has = false;

        sel.forEach(p => {
            let r = rows.find(
                row => (row[currentNameIndex] || "").trim() === p
            );

            let v = r ? (r[i + 1] || "") : "";

            if (v.replace(/no information/i, "").trim()) has = true;

            rowData.push(v);
        });

        if (!hide || has) {
            h += `<tr>
                    <td><strong>${col}</strong></td>
                    ${rowData.map(d => `<td>${d}</td>`).join("")}
                 </tr>`;
        }
    });

    return h + "</tbody></table>";
}

function saveStateToURL() {
    let p = new URLSearchParams();

    DROPDOWN_IDS.forEach((id, i) => {
        let v = document.getElementById(id).value;
        if (v) p.set(`p${i + 1}`, v);
    });

    p.set("lang", currentNameIndex);

    window.history.replaceState(
        {},
        "",
        `${window.location.pathname}?${p}`
    );
}

function loadStateFromURL() {
    let p = new URLSearchParams(window.location.search);

    if (p.has("lang")) {
        currentNameIndex = parseInt(p.get("lang"));
        document.getElementById("languageSelect").value = currentNameIndex;
    }

    DROPDOWN_IDS.forEach((id, i) => {
        let v = p.get(`p${i + 1}`);

        if (v) {
            let dd = document.getElementById(id);

            for (let o of dd.options) {
                if (o.value === decodeURIComponent(v)) {
                    dd.value = o.value;
                }
            }
        }
    });

    updateResults();
}

function downloadCSV() {
    const sel = DROPDOWN_IDS
        .map(id => document.getElementById(id).value)
        .filter(v => v);

    if (!sel.length) {
        alert("Select plants first.");
        return;
    }

    let c =
        "\uFEFFCategory,Latin Name," +
        sel.map(p => `"${p}"`).join(",") +
        "\n";

    columnNames.forEach((col, i) => {
        let r = [];
        let h = false;

        sel.forEach(p => {
            let rv = rows.find(
                w => (w[currentNameIndex] || "").trim() === p
            );

            let v = rv ? (rv[i + 1] || "") : "";

            if (v.replace(/no information/i, "").trim()) h = true;

            r.push(`"${v.replace(/"/g, '""')}"`);
        });

        if (
            !document.getElementById("hideEmptyRows").checked ||
            h
        ) {
            c += `"${col}","",${r.join(",")}\n`;
        }
    });

    let a = document.createElement("a");

    a.href = URL.createObjectURL(
        new Blob([c], { type: "text/csv" })
    );

    a.download = "plants.csv";
    a.click();
}
</script>
